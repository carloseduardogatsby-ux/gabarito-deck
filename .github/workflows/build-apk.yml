
name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Preparar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependências
        run: npm install

      - name: Criar projeto Android com Capacitor
        run: |
          rm -rf android
          npx cap add android

      - name: Sincronizar app com Android
        run: npx cap sync android

      - name: Forçar orientação horizontal no Android
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('android/app/src/main/AndroidManifest.xml')
          s = p.read_text()
          target = 'android:theme="@style/AppTheme.NoActionBarLaunch"'
          if 'android:screenOrientation=' not in s and target in s:
              s = s.replace(target, target + '\n            android:screenOrientation="landscape"')
          p.write_text(s)
          PY

      - name: Gerar APK de teste
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Disponibilizar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: Gabarito-Deck-APK-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
